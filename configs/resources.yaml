market:
  primary_provider: akshare
  fallback_provider: akshare_alternate_endpoint_or_cache
  required_tables:
    - daily_bar
    - stock_basic
    - trade_calendar
    - limit_status
    - suspension_status
  initial_scope:
    market: cn_a_share
    universe: top_100_by_daily_amount
    history_years: 3
  health_check:
    required_functions:
      - stock_info_a_code_name
      - tool_trade_date_hist_sina
      - stock_zh_a_st_em
      - stock_zh_a_spot_em
      - stock_zh_a_hist

text:
  required_sources:
    - exchange_announcements
    - company_announcements
    - curated_news
  initial_scope:
    use_public_sources_only: true
    summarize_after_close: true

ai:
  provider: openai_compatible
  model_tiers:
    research: high_reasoning
    extraction: low_cost
    review: medium_reasoning
  required_capabilities:
    - structured_output
    - long_context
    - tool_calling

compute:
  local_first: true
  storage:
    engine: sqlite
    path: data/local/gushen.sqlite
    journal_mode: wal
    large_feature_format: parquet_later
  minimum:
    cpu_cores: 4
    memory_gb: 16
    disk_gb: 20

execution:
  phase_1:
    real_broker_connection: false
    order_placement: false
    paper_trading_only: true
